[platformio]
default_envs = client1, client2

[env]
platform = espressif32
board = ttgo-t1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

build_flags =
    ; --- Controller CDK link (UART2 — RX-only, ESP32 listens to CDK) ---
    -DCTRL_RX_PIN=33          ; GPIO33, wired to CDK Pi pin 8 (TX)
    -DCTRL_TX_PIN=-1          ; ESP32→CDK direction unused; do not wire CDK Pi pin 10
    -DCTRL_UART_BAUD=115200

    ; --- Diagnostics: echo every byte received from the CDK to USB serial. ---
    ; Useful for bring-up to confirm bytes are flowing in. Set to 0 in production.
    -DUART_DEBUG_ECHO=1

    ; --- Distance filter (cm). Matches DIST_MIN/MAX in old shared.h. ---
    -DDIST_MIN_CM=10
    -DDIST_MAX_CM=400

    ; --- Host MAC (WeMuHostEsp). Update if you swap host boards. ---
    -DHOST_MAC_0=0xA0
    -DHOST_MAC_1=0xDD
    -DHOST_MAC_2=0x6C
    -DHOST_MAC_3=0x74
    -DHOST_MAC_4=0xBF
    -DHOST_MAC_5=0x74

[env:client1]
build_flags = ${env.build_flags}
    -DCLIENT_ID=1
    -DUWB_CHANNEL=9           ; informational; the CDK firmware actually sets this
; Once you know which CP2102 belongs to client 1, uncomment + fill in:
; upload_port  = /dev/cu.usbserial-XXXXXXXXXX
; monitor_port = /dev/cu.usbserial-XXXXXXXXXX

[env:client2]
build_flags = ${env.build_flags}
    -DCLIENT_ID=2
    -DUWB_CHANNEL=5
; upload_port  = /dev/cu.usbserial-YYYYYYYYYY
; monitor_port = /dev/cu.usbserial-YYYYYYYYYY

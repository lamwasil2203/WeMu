[env:ttgo-t-display]
platform = espressif32
board = ttgo-t1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Pin upload + monitor to this exact ESP32 so flashing/monitoring still works
; when the Arduino is also plugged in. The trailing number is the CP2102 USB-
; serial chip's burned-in ID — stable across reboots for this physical board.
; To find your value:   ls /dev/cu.usbserial-*
upload_port  = /dev/cu.usbserial-59270096481
monitor_port = /dev/cu.usbserial-59270096481

build_flags =
    ; --- Display configuration (TFT_eSPI for TTGO T-Display) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000

    ; --- App configuration (read by main.cpp) ---
    ; Toggle simulated incoming packets for display testing without clients.
    ; Set to 1 for fake data, 0 for real ESP-NOW only.
    -DFAKE_DATA=0

    ; Display refresh interval in milliseconds.
    -DDISPLAY_REFRESH_MS=50

    ; A client whose last packet is older than this is shown as STALE.
    -DSTALE_THRESHOLD_MS=1000

    ; Expected client IDs. Packets with other IDs are logged but ignored.
    -DCLIENT_1_ID=1
    -DCLIENT_2_ID=2

    ; Fake-data oscillation periods (ms) when FAKE_DATA=1.
    -DFAKE_C1_PERIOD_MS=4000
    -DFAKE_C2_PERIOD_MS=3000

    ; --- UART forwarding to Arduino (WeMuAudio / Music Maker) ---
    ; ESP32 GPIO that transmits to the Arduino's SoftwareSerial RX.
    -DUART_FWD_TX_PIN=17

    ; Baud rate. Must match WeMuAudio's SoftwareSerial.begin().
    ; 38400 is the reliable upper end for Uno SoftwareSerial.
    -DUART_FWD_BAUD=38400

    ; Which ESP32 hardware UART to use (1 or 2). UART0 is the USB debug.
    -DUART_FWD_PORT_NUM=2

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

; PlatformIO Project Configuration File
;
; Theremin audio-chain test sketch — Arduino UNO + Adafruit Music Maker shield.
;
; Note: this sketch does not link Adafruit_VS1053. With the shield's MIDI
; jumper closed the chip boots into real-time GM mode on its own; we just
; clock raw MIDI bytes at it via SoftwareSerial on D2 @ 31250 baud (the same
; codepath player_miditest.ino takes on the UNO). Adding Adafruit_VS1053
; would drag in SD / Wire / SPI we don't need and bloat the binary.

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; Pin upload + monitor to the Arduino so flashing/monitoring still works when
; the ESP32 is also plugged in. The Uno enumerates as /dev/cu.usbmodem<digits>
; on macOS; the digits can change across USB reconnects, so a glob is safer
; than a hardcoded suffix. If this matches more than one device on your
; machine, replace with the exact path from:   ls /dev/cu.usbmodem*
upload_port  = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*

build_flags =
    ; --- UART input from WeMu Host ESP32 ---
    ; Arduino pin used as the SoftwareSerial RX. Must be a digital pin that's
    ; not taken by the VS1053 shield. D5 is free.
    -DUART_RX_PIN=5

    ; Baud rate. Must match the ESP32's UART_FWD_BAUD (currently 38400).
    -DUART_BAUD=38400

    ; Theremin "playing range" — distances in cm that map to 0.0..1.0 control.
    ; Values outside this range clamp. 10..150 cm = comfortable arm-length play.
    -DPLAY_RANGE_MIN_CM=10
    -DPLAY_RANGE_MAX_CM=150
